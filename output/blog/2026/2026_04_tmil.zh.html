  svg.setAttribute("width", "100%");
  svg.style.height = "auto";
  svg.style.display = "block";

  }

    inner.remove();
  }
  for (const ind of svg.querySelectorAll(".typst-preview-canvas-page-number, .typst-preview-svg-page-number")) {
