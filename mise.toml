[env]
TMIL_ROOT = "content/blog/posts"

[tasks.dev]
description = "Full hot-reloading stack"
tools = { "rust" = "stable", "bun" = "latest", "cargo:bacon" = "latest", "cargo:mprocs" = "latest", "cargo:cargo-nextest" = "latest" }
run = '''
prepare_tmil() {
  echo "Preparing TMIL files..."
  mise run tmil
}

start_dev_stack() {
  echo "Starting dev stack..."
  mprocs "bacon --job site ." "bunx live-server output --port=46785 --no-browser"
}

main() {
  prepare_tmil
  start_dev_stack
}

main
'''

[tasks.tidy]
description = "Bump dependencies and cargo fix"
tools = { "rust" = "stable", "cargo:cargo-edit" = "latest" }
run = "cargo upgrade; cargo fix --broken-code --allow-dirty && cargo clippy --fix --allow-dirty --quiet >/dev/null 2>&1 "

[tasks.tmil]
description = "Compile Touying for current+previous month (or all with --touying-all)"
tools = { "pipx:touying" = "latest" }
depends = ["new-tmil"]
usage = '''
flag "--touying-all" help="Keep and compile Touying HTML for all TMIL months"
'''
run = '''
SEARCH_PATH="{{env.TMIL_ROOT}}"
TOUYING_ALL="${usage_touying_all:-false}"
COUNT=0
DELETED=0

set_month_keys() {
  CURRENT_YEAR=$(date +%Y)
  CURRENT_MONTH=$((10#$(date +%m)))
  if [ "$CURRENT_MONTH" -eq 1 ]; then
    PREV_YEAR=$((CURRENT_YEAR - 1))
    PREV_MONTH=12
  else
    PREV_YEAR=$CURRENT_YEAR
    PREV_MONTH=$((CURRENT_MONTH - 1))
  fi
  CUR_KEY=$(printf "%04d_%02d_tmil" "$CURRENT_YEAR" "$CURRENT_MONTH")
  PREV_KEY=$(printf "%04d_%02d_tmil" "$PREV_YEAR" "$PREV_MONTH")
}

is_kept_month() {
  stem="$1"
  [ "$stem" = "$CUR_KEY" ] || [ "$stem" = "$PREV_KEY" ]
}

delete_old_touying() {
  if [ "$TOUYING_ALL" = "true" ]; then
    return
  fi
  while IFS= read -r html; do
    [ -z "$html" ] && continue
    stem=$(basename "$html" .html)
    if is_kept_month "$stem"; then
      continue
    fi
    rm -f "$html"
    DELETED=$((DELETED + 1))
  done <<EOF
$(find "$SEARCH_PATH" -mindepth 1 -type f -name "*_tmil.html" | sort -f)
EOF
}

compile_touying() {
  while IFS= read -r file; do
    [ -z "$file" ] && continue
    stem=$(basename "$file" .typ)
    if [ "$TOUYING_ALL" != "true" ] && ! is_kept_month "$stem"; then
      continue
    fi
    echo "Compiling TMIL: $file"
    touying compile --root . --format html --sys-inputs '{"tmil":"true"}' "$file"
    COUNT=$((COUNT + 1))
  done <<EOF
$(find "$SEARCH_PATH" -mindepth 1 -type f -name "*_tmil.typ" | sort -f)
EOF
}

print_summary() {
  if [ "$TOUYING_ALL" != "true" ]; then
    echo "Deleted $DELETED old Touying HTML file(s)."
  fi
  echo "Compiled $COUNT TMIL files."
}

main() {
  set_month_keys
  delete_old_touying
  compile_touying
  print_summary
}

main
'''

[tasks.new-tmil]
description = "Ensure TMIL exists from current month backward until first existing month (max 12 months)"
run = '''
SEARCH_PATH="{{env.TMIL_ROOT}}"
TEMPLATE_PATH="content/blog/YYYY_MM_DD_tmil.typ"
CREATED=0
LATEST_PATH=""
ROADMAP_BLOCK=""
FOUND_ANCHOR=0
MISSING_TMP=""

require_template() {
  if [ ! -f "$TEMPLATE_PATH" ]; then
    echo "Template not found: $TEMPLATE_PATH"
    exit 1
  fi
}

set_target_months() {
  CURRENT_YEAR=$(date +%Y)
  CURRENT_MONTH=$((10#$(date +%m)))
  CURRENT_INDEX=$((CURRENT_YEAR * 12 + CURRENT_MONTH))
}

find_latest_tmil() {
  LATEST_REL=$(find "$SEARCH_PATH" -mindepth 1 -type f -name "20??_??_tmil.typ" -printf '%P\n' | sort -V | tail -n 1)
  if [ -n "$LATEST_REL" ]; then
    LATEST_PATH="$SEARCH_PATH/$LATEST_REL"
  fi
}

extract_roadmap_from_path() {
  source_path="$1"
  ROADMAP_BLOCK=$(awk '
    /^#let roadmap_items = \(/ { in_block=1 }
    in_block { print }
    in_block && /^\)$/ { exit }
  ' "$source_path")
}

replace_roadmap_block_in_file() {
  target_path="$1"
  tmp_target=$(mktemp)
  printf '%s\n' "$ROADMAP_BLOCK" > "$tmp_target.roadmap"
  awk -v block_file="$tmp_target.roadmap" '
    BEGIN {
      while ((getline line < block_file) > 0) block = block line ORS
      close(block_file)
    }
    /^#let roadmap_items = \(/ && !replaced {
      printf "%s", block
      replaced=1
      skipping=1
      next
    }
    skipping {
      if ($0 ~ /^\)$/) {
        skipping=0
      }
      next
    }
    { print }
    END {
      if (!replaced) {
        print ""
        printf "%s", block
      }
    }
  ' "$target_path" > "$tmp_target"
  mv "$tmp_target" "$target_path"
  rm -f "$tmp_target.roadmap"
}

sync_template_roadmap() {
  if [ -n "$LATEST_PATH" ]; then
    extract_roadmap_from_path "$LATEST_PATH"
    if [ -z "$ROADMAP_BLOCK" ]; then
      echo "Could not extract #let roadmap_items block from $LATEST_PATH"
      exit 1
    fi
    replace_roadmap_block_in_file "$TEMPLATE_PATH"
    echo "Synced template roadmap from latest TMIL: $LATEST_PATH"
    return
  fi

  extract_roadmap_from_path "$TEMPLATE_PATH"
  if [ -z "$ROADMAP_BLOCK" ]; then
    echo "Could not extract #let roadmap_items block from $TEMPLATE_PATH"
    exit 1
  fi
}

collect_missing_months() {
  MISSING_TMP=$(mktemp)
  offset=0
  while [ "$offset" -lt 12 ]; do
    idx=$((CURRENT_INDEX - offset))
    year=$(((idx - 1) / 12))
    month=$((((idx - 1) % 12) + 1))
    month_padded=$(printf "%02d" "$month")
    rel="$year/${year}_${month_padded}_tmil.typ"
    path="$SEARCH_PATH/$rel"

    if [ -e "$path" ]; then
      FOUND_ANCHOR=1
      break
    fi

    printf "%s:%s\n" "$year" "$month" >> "$MISSING_TMP"
    offset=$((offset + 1))
  done
}

create_tmil_file() {
  year="$1"
  month="$2"
  month_padded=$(printf "%02d" "$month")
  rel="$year/${year}_${month_padded}_tmil.typ"
  path="$SEARCH_PATH/$rel"

  if [ -e "$path" ]; then
    echo "Exists, skipped: $path"
    return
  fi

  mkdir -p "$(dirname "$path")"
  cp "$TEMPLATE_PATH" "$path"

  tmp_new=$(mktemp)
  awk -v next_year="$year" -v next_month="$month" '
  {
    if ($0 ~ /^#let mdate = datetime\(/) {
      print "#let mdate = datetime(year: " next_year ", month: " next_month ", day: 1)"
      next
    }
    if (match($0, /^#import "([^"]+)"/, m)) {
      path = m[1]
      if (path !~ /^@/ && path !~ /^\// && path !~ /^\.\.\//) {
        sub(/^#import "/, "#import \"../../")
      }
    }
    print
  }
  ' "$path" > "$tmp_new"
  mv "$tmp_new" "$path"
  echo "Created TMIL file: $path"
  CREATED=$((CREATED + 1))
}

create_missing_months() {
  if [ ! -s "$MISSING_TMP" ]; then
    return
  fi

  tmp_rev=$(mktemp)
  tac "$MISSING_TMP" > "$tmp_rev"
  while IFS=: read -r year month; do
    [ -z "$year" ] && continue
    create_tmil_file "$year" "$month"
  done < "$tmp_rev"
  rm -f "$tmp_rev"
}

print_summary() {
  if [ "$CREATED" -eq 0 ]; then
    echo "No new TMIL files needed."
  else
    echo "Created $CREATED TMIL file(s)."
  fi
  if [ "$FOUND_ANCHOR" -eq 0 ]; then
    echo "No anchor month found in the last 12 months."
  fi
  rm -f "$MISSING_TMP"
}

main() {
  require_template
  set_target_months
  find_latest_tmil
  sync_template_roadmap
  collect_missing_months
  create_missing_months
  print_summary
}

main
'''
